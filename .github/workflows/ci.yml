name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: omni
          POSTGRES_PASSWORD: omni
          POSTGRES_DB: omni_mcp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omni"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://omni:omni@localhost:5432/omni_mcp
      PUBLIC_BASE_URL: http://localhost:8000
      DASHBOARD_BASE_URL: http://localhost:3000
      ODOO_INTERNAL_BASE_URL: http://localhost:8069
      # Must match the literal in tests/conftest.py — alembic loads Settings
      # before conftest runs, so this can't just be "whatever conftest sets".
      ODOO_INTERNAL_SHARED_SECRET: test-shared-secret
      TOKEN_SIGNING_KEY: ci-signing-key-padded-to-32-bytes!!

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: alembic upgrade head
      - run: pytest --cov=app --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: omnidim-mcp-cloud:ci
      - name: Smoke test the image
        run: |
          docker run -d --name smoke \
            -e DATABASE_URL=postgresql+asyncpg://invalid/db \
            -e PUBLIC_BASE_URL=http://localhost:8000 \
            -e DASHBOARD_BASE_URL=http://localhost:3000 \
            -e ODOO_INTERNAL_BASE_URL=http://localhost:8069 \
            -e ODOO_INTERNAL_SHARED_SECRET=smoke \
            -e TOKEN_SIGNING_KEY=smoke-signing-key-padded-to-32-bytes \
            -p 8000:8000 \
            omnidim-mcp-cloud:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/healthz; then exit 0; fi
            sleep 1
          done
          docker logs smoke
          exit 1

  # Build and push the tagged image on a GitHub-hosted runner so the prod
  # box never builds; the self-hosted deploy job only pulls and restarts.
  publish:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/omnidim/omnidim-mcp-cloud:${{ github.ref_name }}
            ghcr.io/omnidim/omnidim-mcp-cloud:latest

  # Runs on the deploy host itself (self-hosted runner labelled omnidim-mcp),
  # so there is no SSH hop or firewall to traverse. The runner must already be
  # logged in to ghcr and able to use docker compose in MCP_DEPLOY_PATH.
  deploy:
    runs-on: [self-hosted, omnidim-mcp]
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Deploy with healthcheck + rollback
        run: |
          set -e
          cd "${{ secrets.MCP_DEPLOY_PATH }}"
          PREV=$(grep '^MCP_IMAGE=' .env 2>/dev/null | cut -d= -f2- || echo "")
          NEW="ghcr.io/omnidim/omnidim-mcp-cloud:${{ github.ref_name }}"
          echo "Deploying $NEW (previous: ${PREV:-unset})"

          docker pull "$NEW"

          grep -v '^MCP_IMAGE=' .env > .env.next 2>/dev/null || true
          echo "MCP_IMAGE=$NEW" >> .env.next
          mv .env.next .env
          chmod 600 .env

          # Forward-compatible migrations: old app keeps working against
          # the new schema during the swap window.
          docker compose run --rm app alembic upgrade head
          docker compose up -d --no-deps app

          ok=0
          for i in $(seq 1 30); do
            if curl -fsS https://mcp.omnidim.io/healthz > /dev/null; then
              ok=1; break
            fi
            sleep 2
          done

          if [ "$ok" -ne 1 ]; then
            echo "Healthcheck failed. Rolling back to ${PREV:-unset}."
            if [ -n "$PREV" ]; then
              grep -v '^MCP_IMAGE=' .env > .env.next
              echo "MCP_IMAGE=$PREV" >> .env.next
              mv .env.next .env
              chmod 600 .env
              docker compose up -d --no-deps app
            fi
            docker compose logs --tail=80 app
            exit 1
          fi

          echo "Deployed $NEW successfully."
