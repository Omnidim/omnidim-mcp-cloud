[project]
name = "omni-mcp-server"
version = "0.0.1"
description = "OAuth 2.1 authorization server and MCP transport for OmniDimension."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "OmniDimension", email = "support@omnidim.io" }]
dependencies = [
    "fastapi>=0.115",
    "httpx>=0.27",
    "pyyaml>=6.0",
    "python-multipart>=0.0.20",
    "uvicorn[standard]>=0.32",
    "gunicorn>=23",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "psycopg[binary]>=3.2",
    "alembic>=1.14",
    "cryptography>=42.0",
    "structlog>=24.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "httpx>=0.27",
    "respx>=0.21",
    "ruff>=0.7",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "RUF", "S", "ASYNC"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"alembic/**" = ["E501"]
# Auto-generated registry — emitted by scripts/regen.py from the upstream
# OpenAPI spec. Lint-style nits in this file are fixed in the generator,
# not here.
"app/_generated/**" = ["ALL"]
# Ruff flags OAuth auth-method literals ("none", "client_secret_basic") as
# suspected hardcoded passwords. They are spec-defined token_endpoint_auth_method
# values, not credentials.
"app/schemas/oauth.py" = ["S105"]
"app/services/clients.py" = ["S105"]
"tests/test_register.py" = ["S105", "S106"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra -q"

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["alembic.*"]
ignore_errors = true
